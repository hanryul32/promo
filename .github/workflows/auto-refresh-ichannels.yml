name: Auto Refresh iChannels Links

on:
  schedule:
    - cron: "25 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Auto update iChannels links
        run: |
          python scripts/auto_update_ichannels.py

      - name: Commit changes if any
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add life/index.html
          git commit -m "chore: auto refresh iChannels links"
          git push
