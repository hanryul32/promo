name: GitHub Smart Agent

on:
  schedule:
    - cron: "29 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-smart-agent-promo
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run static Pages health checks
        id: health
        shell: bash
        continue-on-error: true
        run: |
          set +e
          : > health.log
          echo "== repository surface ==" | tee -a health.log
          test -f README.md 2>&1 | tee -a health.log
          readme_status=${PIPESTATUS[0]}

          echo "== gh-pages branch ==" | tee -a health.log
          git fetch origin gh-pages --depth=1 2>&1 | tee -a health.log
          fetch_status=${PIPESTATUS[0]}
          if [ "$fetch_status" -eq 0 ]; then
            git ls-tree -r --name-only origin/gh-pages | head -50 2>&1 | tee -a health.log
          fi

          echo "== live Pages endpoint ==" | tee -a health.log
          curl --fail --location --max-time 30 --silent --show-error https://hanryul32.github.io/promo/life/ > /tmp/promo_life.html 2>> health.log
          curl_status=$?
          if [ "$curl_status" -eq 0 ]; then
            wc -c /tmp/promo_life.html | tee -a health.log
          fi

          if [ "$readme_status" -ne 0 ] || [ "$fetch_status" -ne 0 ] || [ "$curl_status" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Upload health log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promo-smart-agent-health
          path: health.log

      - name: Create or update smart-agent issue
        if: steps.health.outcome == 'failure' || steps.health.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('health.log') ? fs.readFileSync('health.log', 'utf8').slice(-6000) : '(no log)';
            const labels = ['github-smart-agent', 'automated-maintenance'];
            for (const name of labels) {
              try {
                await github.rest.issues.createLabel({owner: context.repo.owner, repo: context.repo.repo, name, color: name === 'github-smart-agent' ? '5319e7' : '0e8a16'});
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }
            const title = 'GitHub Smart Agent: promo Pages health anomaly';
            const existing = await github.rest.issues.listForRepo({owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'github-smart-agent', per_page: 50});
            const body = `自動健康檢查發現 GitHub Pages 或公開 repo 異常，請 GitHub/Copilot 智能代理協助修復。\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n\`\`\`text\n${log}\n\`\`\``;
            const issue = existing.data.find(item => item.title === title);
            if (issue) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels});
            }