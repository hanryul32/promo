name: SEO Global Push — Sitemap Ping & Deploy Verification

on:
  push:
    branches: [main]
    paths:
      - 'life/**'
      - 'sitemap.xml'
      - 'feed.xml'
      - 'robots.txt'
  schedule:
    # Weekly ping every Monday 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  seo-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sitemap lastmod to today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Updated sitemap lastmod to ${TODAY}"

      - name: Commit updated sitemap if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet sitemap.xml || {
            git add sitemap.xml
            git commit -m "chore(seo): auto-update sitemap lastmod to $(date -u +%Y-%m-%d)"
            git push
          }

      - name: Submit via IndexNow (Bing + Yandex + others)
        env:
          INDEXNOW_KEY: 7a4050a3180441c7b7f8a30c2210e11c
        run: |
          echo "Submitting URLs via IndexNow..."
          PAYLOAD=$(cat <<'EOF'
          {
            "host": "hanryul32.github.io",
            "key": "7a4050a3180441c7b7f8a30c2210e11c",
            "keyLocation": "https://hanryul32.github.io/promo/7a4050a3180441c7b7f8a30c2210e11c.txt",
            "urlList": [
              "https://hanryul32.github.io/promo/life/",
              "https://hanryul32.github.io/promo/life/ko/",
              "https://hanryul32.github.io/promo/life/en/",
              "https://hanryul32.github.io/promo/sitemap.xml",
              "https://hanryul32.github.io/promo/feed.xml"
            ]
          }
          EOF
          )
          STATUS=$(curl -s -o /tmp/indexnow_resp.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" --max-time 20) || STATUS="timeout"
          echo "IndexNow API status: $STATUS"
          cat /tmp/indexnow_resp.txt || true

          # Also submit to Bing directly
          STATUS_BING=$(curl -s -o /tmp/bing_resp.txt -w "%{http_code}" \
            -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" --max-time 20) || STATUS_BING="timeout"
          echo "Bing IndexNow status: $STATUS_BING"

      - name: Ping Google via RSS autodiscovery
        run: |
          FEED="https://hanryul32.github.io/promo/feed.xml"
          echo "Notifying Google via Feedburner-compatible ping..."
          curl -s -o /dev/null -w "Google Blog ping: %{http_code}\n" \
            "https://blogsearch.google.com/ping/RPC2" \
            --data-urlencode "name=Han Ryul Life" \
            --data-urlencode "url=https://hanryul32.github.io/promo/life/" \
            --data-urlencode "changesURL=$FEED" \
            --max-time 10 || true

      - name: Verify live site health
        run: |
          echo "Checking live endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hanryul32.github.io/promo/life/" \
            --max-time 15 --retry 2) || STATUS="timeout"
          echo "Live site HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site is healthy"
          else
            echo "WARNING: site returned $STATUS — may still be deploying"
          fi

      - name: Check RSS feed valid
        run: |
          curl -s "https://hanryul32.github.io/promo/feed.xml" \
            --max-time 10 | grep -q "<rss" && echo "RSS feed OK" || echo "RSS feed not yet live (pending deploy)"

      - name: Summary
        run: |
          echo "## SEO Global Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap lastmod | Updated to $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| IndexNow (Bing/Yandex) | Submitted 5 URLs |" >> $GITHUB_STEP_SUMMARY
          echo "| Google RSS ping | Sent |" >> $GITHUB_STEP_SUMMARY
          echo "| Site URL | [hanryul32.github.io/promo/life/](https://hanryul32.github.io/promo/life/) |" >> $GITHUB_STEP_SUMMARY
